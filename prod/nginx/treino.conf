# Frontend (Next.js) - treino.nexux360.com.br
# Servidor: 187.77.53.197
#
# Instalar:
#   sudo cp treino.conf /etc/nginx/sites-available/treino.conf
#   sudo ln -s /etc/nginx/sites-available/treino.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d treino.nexux360.com.br
#
# O bloco abaixo e so HTTP (porta 80). O certbot reescreve este arquivo
# automaticamente para adicionar o bloco HTTPS (porta 443) e o redirect.
# Nao adicione o bloco SSL manualmente - deixe o certbot fazer isso.

server {
    listen 80;
    listen [::]:80;
    server_name treino.nexux360.com.br;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
