# Backend (Fastify) - api.treino.nexux360.com.br
# Servidor: 187.77.53.197
#
# Instalar:
#   sudo cp api.conf /etc/nginx/sites-available/api.conf
#   sudo ln -s /etc/nginx/sites-available/api.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.treino.nexux360.com.br
#
# O bloco abaixo e so HTTP (porta 80). O certbot reescreve este arquivo
# automaticamente para adicionar o bloco HTTPS (porta 443) e o redirect.
# Nao adicione o bloco SSL manualmente - deixe o certbot fazer isso.
#
# proxy_buffering fica desligado porque as rotas de IA (/ai) usam
# streamText (SSE) - com buffer ligado o nginx so entrega a resposta
# inteira no final, quebrando o efeito de streaming no chat.

server {
    listen 80;
    listen [::]:80;
    server_name api.treino.nexux360.com.br;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
