services:
  postgres:
    image: postgres:16-alpine
    container_name: treino-ai-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: treino-ai
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d treino-ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./bootcamp-treinos-api
      target: deps
    container_name: treino-ai-dev-api
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm exec prisma generate && pnpm exec prisma migrate deploy && pnpm dev"
    env_file:
      - ./bootcamp-treinos-api/.env
    environment:
      CI: "true"
      DATABASE_URL: postgresql://postgres:password@postgres:5432/treino-ai
      API_BASE_URL: http://localhost:${API_HOST_PORT:-8080}
      WEB_APP_BASE_URL: http://localhost:${FRONTEND_HOST_PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    volumes:
      - ./bootcamp-treinos-api:/app
      - dev_api_node_modules:/app/node_modules

  frontend:
    build:
      context: ./bootcamp-treinos-frontend
      target: deps
    container_name: treino-ai-dev-frontend
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev"
    environment:
      CI: "true"
      NEXT_PUBLIC_API_URL: http://localhost:${API_HOST_PORT:-8080}
      NEXT_PUBLIC_BASE_URL: http://localhost:${FRONTEND_HOST_PORT:-3000}
      API_INTERNAL_URL: http://api:8080
    depends_on:
      - api
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./bootcamp-treinos-frontend:/app
      - dev_frontend_node_modules:/app/node_modules

volumes:
  dev_postgres_data:
  dev_api_node_modules:
  dev_frontend_node_modules:
