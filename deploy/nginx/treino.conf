# Frontend (Next.js) - treino.nexux360.com.br
# Copiar para /etc/nginx/sites-available/treino.conf no VPS e:
#   ln -s /etc/nginx/sites-available/treino.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d treino.nexux360.com.br

server {
    listen 80;
    listen [::]:80;
    server_name treino.nexux360.com.br;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
