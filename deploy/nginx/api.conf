# Backend (Fastify) - api.treino.nexux360.com.br
# Copiar para /etc/nginx/sites-available/api.conf no VPS e:
#   ln -s /etc/nginx/sites-available/api.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d api.treino.nexux360.com.br
#
# proxy_buffering fica desligado porque as rotas de IA (/ai) usam
# streamText (SSE) - com buffer ligado o nginx so entrega a resposta
# inteira no final, quebrando o efeito de streaming no chat.

server {
    listen 80;
    listen [::]:80;
    server_name api.treino.nexux360.com.br;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
